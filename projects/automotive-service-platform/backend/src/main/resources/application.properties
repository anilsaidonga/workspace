# Spring Boot application name
spring.application.name=backend

# H2 Database Configuration
# Enables the H2 database console, accessible at /h2-console
spring.h2.console.enabled=true

# Database connection settings for an in-memory H2 database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA (Java Persistence API) Configuration
# Specifies the Hibernate dialect for H2, allowing JPA to generate appropriate SQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
